config:
  warningsAsErrors: true

complexity:
  active: true

comments:
  active: true
  DocumentationOverPrivateFunction:
    active: false
  DocumentationOverPrivateProperty:
    active: false
  DeprecatedBlockTag:
    active: true
    excludes: [ "**/src/*Test/**", "**/examples/**", "**/build-conventions/**" ]
    ignoreAnnotated: [ kotlin.Deprecated ]
  OutdatedDocumentation:
    active: true
    excludes: [ "**/src/*Test/**", "**/examples/**", "**/build-conventions/**" ]
    ignoreAnnotated: [ kotlin.Deprecated ]
    allowParamOnConstructorProperties: false
  UndocumentedPublicClass:
    active: true
    excludes: [ "**/src/*Test/**", "**/examples/**", "**/build-conventions/**" ]
    ignoreAnnotated: [ kotlin.Deprecated ]
  UndocumentedPublicFunction:
    active: true
    excludes: [ "**/src/*Test/**", "**/examples/**", "**/build-conventions/**" ]
    ignoreAnnotated: [ kotlin.Deprecated ]
  UndocumentedPublicProperty:
    active: true
    ignoreAnnotated: [ kotlin.Deprecated ]
    excludes: [ "**/src/*Test/**", "**/examples/**", "**/build-conventions/**" ]

naming:
  InvalidPackageDeclaration:
    active: false
  MatchingDeclarationName:
    active: false
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_a-zA-Z0-9]*'
  FunctionNaming:
    # @Composable functions conventionally use PascalCase (e.g. `App()`).
    ignoreAnnotated: [ 'androidx.compose.runtime.Composable' ]

style:
  ForbiddenComment:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    active: false
  MagicNumber:
    active: false

# Renamed from `formatting` -> `ktlint` in detekt 2.0
# (rules now provided by the `dev.detekt:detekt-rules-ktlint-wrapper` plugin).
ktlint:
  Filename:
    active: false
  NoWildcardImports:
    active: false
  Indentation:
    indentSize: 4
  FinalNewline:
    active: true
