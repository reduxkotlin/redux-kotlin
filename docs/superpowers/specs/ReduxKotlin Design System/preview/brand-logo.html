<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--fg-1); }
  .wrap { padding: 22px 26px; display:flex; gap: 26px; align-items:center; }
  .lockup { display:flex; align-items:center; gap: 12px; }
  .lockup img { width: 52px; height: 52px; }
  .lockup .name { font: var(--w-semibold) 24px var(--font-display); letter-spacing:-.4px; }
  .dark { background: var(--rk-ink); border-radius: var(--radius-md); padding: 14px 18px; display:flex; align-items:center; gap:12px; }
  .dark img { width: 44px; height: 44px; }
  .dark .name { color:#fff; font: var(--w-semibold) 20px var(--font-display); }
  .cap { margin-left:auto; font:11px var(--font-mono); color:var(--fg-3); max-width:150px; text-align:right; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup">
      <img src="../assets/reduxkotlin-logo.svg" alt="ReduxKotlin">
      <span class="name">ReduxKotlin</span>
    </div>
    <div class="dark">
      <img src="../assets/reduxkotlin-logo.svg" alt="ReduxKotlin">
      <span class="name">ReduxKotlin</span>
    </div>
    <div class="cap">Primary lockup — gradient swirl + wordmark · light &amp; dark</div>
  </div>
</body>
</html>
