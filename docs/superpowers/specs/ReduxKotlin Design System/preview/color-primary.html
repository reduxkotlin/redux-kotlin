<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--fg-1); }
  .wrap { padding: 22px 26px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--elev-1); }
  .sw { flex: 1; height: 76px; display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font: var(--w-medium) 11px var(--font-mono); }
  .meta { display: flex; justify-content: space-between; margin-top: 12px; align-items: baseline; }
  .name { font: var(--w-semibold) 14px var(--font-sans); }
  .hex { font: 12px var(--font-mono); color: var(--fg-3); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:#044da6;color:#fff"><span>darkest</span></div>
      <div class="sw" style="background:#045eca;color:#fff"><span>darker</span></div>
      <div class="sw" style="background:#0464d6;color:#fff"><span>dark</span></div>
      <div class="sw" style="background:#137af9;color:#fff"><span>500 ·base</span></div>
      <div class="sw" style="background:#2d8afa;color:#fff"><span>light</span></div>
      <div class="sw" style="background:#3a92fa;color:#fff"><span>lighter</span></div>
      <div class="sw" style="background:#62a8fb;color:#0e1726"><span>lightest</span></div>
    </div>
    <div class="meta">
      <div class="name">Primary — Brand Blue</div>
      <div class="hex">--rk-blue · #137AF9 · links, buttons, focus, selection</div>
    </div>
  </div>
</body>
</html>
