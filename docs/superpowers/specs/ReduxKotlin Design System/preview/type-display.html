<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--fg-1); }
  .wrap { padding: 20px 26px; }
  .d { font: var(--w-medium) 44px/1 var(--font-display); letter-spacing: -1px; }
  .h { font: var(--w-semibold) 28px/1.15 var(--font-display); letter-spacing:-.25px; margin-top: 14px; }
  .meta { margin-top: 16px; display:flex; gap:22px; font:11px var(--font-mono); color:var(--fg-3); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="d">Predictable state</div>
    <div class="h">A redux standard for Kotlin</div>
    <div class="meta">
      <span>Roboto Flex · Display 44/52 · Medium</span>
      <span>Headline 28/36 · Semibold · -0.25px</span>
    </div>
  </div>
</body>
</html>
