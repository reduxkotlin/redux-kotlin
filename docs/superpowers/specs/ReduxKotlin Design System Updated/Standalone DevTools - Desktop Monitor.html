<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Standalone Redux DevTools — Desktop Monitor</title>
<link rel="stylesheet" href="monitor/colors_and_type.css" />
<style>
  html, body { margin: 0; height: 100%; background: #05080d; overflow: hidden; }
  * { box-sizing: border-box; }
  ::selection { background: rgba(200,88,188,0.32); }

  /* ───────────────── THEME ───────────────── */
  /* Palette custom properties (--dt-*) are applied inline on .dock by the app
     (DARK_VARS / LIGHT_VARS) so they always cascade and switch reliably. */

  .dock {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    background: var(--dt-bg); color: var(--dt-ink); font-family: var(--font-sans);
    overflow: hidden; transition: background .3s var(--ease-standard);
  }
  .winbar {
    height: 34px; flex-shrink: 0; display: flex; align-items: center; padding: 0 14px;
    background: var(--dt-bar-bg); border-bottom: 1px solid var(--dt-line); position: relative;
  }
  .lights { display: flex; gap: 8px; }
  .lights span { width: 12px; height: 12px; border-radius: 999px; display: block; }
  .wintitle {
    position: absolute; left: 0; right: 0; text-align: center; pointer-events: none;
    font-family: var(--font-sans); font-size: 12.5px; font-weight: 500; color: var(--dt-dim);
  }
  input::placeholder { color: var(--dt-faint); }

  /* scrollbars */
  .dock ::-webkit-scrollbar { width: 9px; height: 9px; }
  .dock ::-webkit-scrollbar-thumb { background: var(--dt-line-2); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  .dock ::-webkit-scrollbar-thumb:hover { background: var(--dt-faint); background-clip: padding-box; }

  /* entrance animations animate transform only — never opacity — so a backgrounded
     iframe / print / reduced-motion shows the visible end-state, not a blank frame. */
  @keyframes rkRowIn { from { transform: translateX(-7px); } to { transform: none; } }
  @keyframes rkLit { from { transform: translateY(5px) scale(.99); } to { transform: none; } }
  @keyframes rkFadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes rkFlow { 0% { top: 0; opacity: 0; } 18% { opacity: 1; } 82% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
  @keyframes rkPulse { 0% { opacity: .7; transform: scale(1); } 70% { opacity: 0; transform: scale(2.1); } 100% { opacity: 0; transform: scale(2.1); } }
  @keyframes rkSpin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="monitor/icons.jsx"></script>
<script type="text/babel" src="monitor/data.jsx"></script>

<script type="text/babel" src="monitor/chrome.jsx"></script>

</html>
