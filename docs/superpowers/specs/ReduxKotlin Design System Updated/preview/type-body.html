<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--fg-1); }
  .wrap { padding: 20px 26px; }
  .title { font: var(--w-semibold) 22px/1.3 var(--font-sans); }
  .body { font: 16px/1.5 var(--font-sans); color: var(--fg-2); margin-top: 8px; max-width: 560px; }
  .body b { color: var(--fg-1); }
  .lbls { display:flex; gap:10px; margin-top:14px; align-items:center; }
  .chip { font: var(--w-medium) 14px var(--font-sans); background: var(--md-surface-container-high); padding: 4px 12px; border-radius: var(--radius-full); }
  .cap { margin-top: 14px; font:11px var(--font-mono); color:var(--fg-3); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="title">Title — 22 / 28 · Semibold</div>
    <div class="body">Body copy is set in Roboto Flex at 16/24. Redux helps you write applications that <b>behave consistently</b> and are <b>easy to test</b>.</div>
    <div class="lbls"><span class="chip">Label Large</span><span class="chip">Medium 500</span></div>
    <div class="cap">Title · Body Large · Label — the everyday UI text styles</div>
  </div>
</body>
</html>
