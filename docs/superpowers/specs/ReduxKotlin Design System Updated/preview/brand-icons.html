<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--fg-1); }
  .wrap { padding: 22px 26px; }
  .row { display:flex; gap: 30px; align-items:center; }
  .ic { text-align:center; }
  .ic img { width: 46px; height: 46px; object-fit: contain; }
  .ic b { display:block; font: var(--w-medium) 12px var(--font-sans); margin-top: 9px; color: var(--fg-2); }
  .cap { margin-top: 16px; font:12px var(--font-mono); color:var(--fg-3); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="ic"><img src="../assets/icon-multiplatform.png" alt=""><b>Devices</b></div>
      <div class="ic"><img src="../assets/icon-check.svg" alt=""><b>Check</b></div>
      <div class="ic"><img src="../assets/icon-cubes.svg" alt=""><b>Cubes</b></div>
      <div class="ic"><img src="../assets/icon-cogs.svg" alt=""><b>Cogs</b></div>
      <div class="ic"><img src="../assets/icon-debugging.svg" alt=""><b>Debug</b></div>
      <div class="ic"><img src="../assets/icon-github.svg" alt=""><b>GitHub</b></div>
    </div>
    <div class="cap">Feature icons — simple monochrome line/solid (Noun Project + Font Awesome)</div>
  </div>
</body>
</html>
