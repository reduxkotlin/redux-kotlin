name: Release

on:
  push:
    paths:
      - '**/src/**'
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        required: false
        description: Package version to publish under
      skipPages:
        description: Should we skip releasing GitHub pages
        required: false
        default: "y"
      skipMavenCentral:
        description: Should we skip publishing artefacts to Maven Central
        required: false
        default: "y"
      skipGitHub:
        description: Should we skip publishing artefacts to GitHub Packages
        required: false
        default: "y"
  release:
    types: [ created ]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=true"

concurrency:
  cancel-in-progress: false
  group: release-${{ github.workflow }}-${{ github.head_ref || github.ref }}

jobs:
  check:
    uses: ./.github/workflows/check.yml

  resolve-version:
    uses: ./.github/workflows/resolve-version.yml
    needs: [ check ]
    with:
      desired-version: ${{ github.event.release.tag_name || github.event.inputs.version }}

  build-dokka:
    name: Build Dokka
    needs:
      - check
      - resolve-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Gradle Assemble Dokka
        run: ./gradlew dokkaGenerate -Pversion=${VERSION//v} --scan

      - uses: actions/upload-artifact@v7
        with:
          name: dokka
          path: |
            **/build/dokka

  release-Artefacts:
    name: Release to ${{ matrix.repository.name }}
    # A single macOS host cross-compiles every Kotlin target (Apple, linux, mingw, js,
    # wasm, jvm, android), so the whole multiplatform release publishes from one runner.
    # The Central Publisher Portal has no shared server-side staging, so splitting across
    # OS runners would create fragmented, separately-validated deployments.
    runs-on: macos-latest
    needs:
      - check
      - resolve-version
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
      GH_USERNAME: ${{ github.actor }}
      GH_PASSWORD: ${{ github.token }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        repository:
          # GitHub Packages is intentionally not published: it rejects the Compose
          # Android AAR publications with HTTP 422, and Maven Central is the canonical
          # distribution channel. Re-add a matrix entry here if that changes.
          - name: Maven Central
            # Uploads all modules to the Central Publisher Portal and auto-releases
            # them (automaticRelease = true in convention.publishing).
            tasks: publishToMavenCentral
            enabled: ${{ github.event.inputs.skipMavenCentral != 'y' }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ matrix.repository.enabled == true }}

      - uses: actions/setup-java@v5
        if: ${{ matrix.repository.enabled == true }}
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: ${{ matrix.repository.enabled == true }}
        uses: gradle/actions/setup-gradle@v6

      - name: Gradle Publish to ${{ matrix.repository.name }}
        if: ${{ matrix.repository.enabled == true }}
        run: ./gradlew ${{ matrix.repository.tasks }} -Pversion=${VERSION//v} --scan

  release-Dokka:
    runs-on: ubuntu-latest
    needs:
      - build-dokka
      - resolve-version
    if: ${{ github.event.inputs.skipPages != 'y' && needs.resolve-version.outputs.snapshot == 'false' }}
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dokka

      - name: Build Dokka Pages
        run: |
          REPO_NAME=${{ github.repository }}
          REPO_NAME=${REPO_NAME#${{ github.repository_owner }}/}
          # The `dokka` artifact uploads `**/build/dokka`, and download-artifact strips
          # the common ancestor, so the HTML lands at `html/` rather than the old
          # `build/dokka/html/`. Locate the generated html dir (the one with index.html)
          # rather than hardcoding a path.
          DOKKA_HTML="$(find . -type d -name html -exec test -e '{}/index.html' ';' -print | head -1)"
          test -n "$DOKKA_HTML" || { echo "no Dokka html/ with index.html found"; find . -type d -name html; exit 1; }
          cp -avr "${DOKKA_HTML}/" public;
          find public -type f -regex '.*\.\(htm\|html\|txt\|text\|js\|css\)$' -exec gzip -f -k {} \;
          echo "/${REPO_NAME} /${REPO_NAME}/${REPO_NAME}/index.html 301" > public/_redirects;
          echo "/${REPO_NAME}/index.html /${REPO_NAME}/${REPO_NAME}/index.html 301" >> public/_redirects;

      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: gh-pages
          build_dir: public
        env:
          GITHUB_TOKEN: ${{ github.token }}
