name: CI

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # detekt upgraded to 1.23.8 to restore JDK 17 compatibility for detektAll.
    name: Validate (JDK 17)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle build
        run: ./gradlew --no-daemon --stacktrace detektAll

  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        java: ['17']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests (retry up to 3 times on flaky failure)
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Test attempt ${attempt}/${max_attempts}"
            if ./gradlew --no-daemon --stacktrace --rerun-tasks test; then
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Tests failed on attempt ${attempt}; retrying..."
              sleep 5
            fi
          done

          echo "Tests failed after ${max_attempts} attempts"
          exit 1

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: |
            **/build/reports/**
            **/build/test-results/**

  gradle8-trial:
    # Non-blocking trial lane to de-risk a future default wrapper migration to Gradle 8.
    name: Gradle 8 Trial (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8 (trial)
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.10.2'

      - name: Run Gradle 8 trial checks
        id: trial
        shell: bash
        run: |
          set -u -o pipefail
          mkdir -p .artifacts

          overall_status=0

          run_step() {
            local name="$1"
            shift

            printf "\n=== %s ===\n" "$name" | tee -a .artifacts/gradle8-trial-summary.log
            if "$@" 2>&1 | tee ".artifacts/${name}.log"; then
              echo "✅ ${name} passed" | tee -a .artifacts/gradle8-trial-summary.log
            else
              echo "❌ ${name} failed" | tee -a .artifacts/gradle8-trial-summary.log
              overall_status=1
            fi
          }

          run_step "detektAll" gradle --no-daemon --stacktrace --warning-mode all detektAll

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Test attempt ${attempt}/${max_attempts}" | tee -a .artifacts/test.log
            if gradle --no-daemon --stacktrace --warning-mode all --rerun-tasks test 2>&1 | tee -a .artifacts/test.log; then
              test_status=0
              break
            fi

            test_status=1
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Tests failed on attempt ${attempt}; retrying..." | tee -a .artifacts/test.log
              sleep 5
            fi
          done

          if [ "${test_status:-1}" -ne 0 ]; then
            echo "Tests failed after ${max_attempts} attempts" | tee -a .artifacts/test.log
            echo "❌ test failed" | tee -a .artifacts/gradle8-trial-summary.log
            overall_status=1
          else
            echo "✅ test passed" | tee -a .artifacts/gradle8-trial-summary.log
          fi

          run_step "help" gradle --no-daemon --stacktrace --warning-mode all help
          echo "overall_status=$overall_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Collect Gradle 8 diagnostics on failure
        if: steps.trial.outputs.overall_status != '0'
        shell: bash
        run: |
          {
            echo "# Gradle 8 trial diagnostics"
            echo
            echo "## gradle --version"
            gradle --version || true
            echo
            echo "## Wrapper version"
            grep '^distributionUrl=' gradle/wrapper/gradle-wrapper.properties || true
          } | tee .artifacts/gradle8-diagnostics.txt

      - name: Upload Gradle 8 trial artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle8-trial-artifacts
          path: |
            .artifacts/**
            **/build/reports/**
            **/build/test-results/**

      - name: Summarize Gradle 8 trial
        if: always()
        shell: bash
        run: |
          {
            echo "## Gradle 8 Trial (non-blocking)"
            echo "Checks: \`detektAll\`, \`test\` (retry up to 3x), and \`help\` config smoke."
            if [ "${{ steps.trial.outputs.overall_status }}" = "0" ]; then
              echo "✅ Passed on Gradle 8.10.2 (informational lane)."
            else
              echo "⚠️ Failed on Gradle 8.10.2 (non-blocking)."
            fi
            echo "Uploaded artifact: \`gradle8-trial-artifacts\` with logs and reports (always)."
            echo
            echo "This lane is informational and does not gate PR merges."
          } >> "$GITHUB_STEP_SUMMARY"
