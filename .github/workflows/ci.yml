name: CI

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # NOTE: Keep JDK 11 for detektAll stability.
    # Last observed JDK 17 regression: run 22270962437 failed in "Validate Gradle build".
    # Safe migration path: keep this blocking job on 11 and use `validate-jdk17-probe` for signal.
    name: Validate (JDK 11)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle build
        run: ./gradlew --no-daemon --stacktrace detektAll

  validate-jdk17-probe:
    name: Validate probe (JDK 17, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Probe detektAll on JDK 17
        run: ./gradlew --no-daemon --stacktrace detektAll

  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        java: ['17']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests (retry once on flaky failure)
        run: |
          ./gradlew --no-daemon --stacktrace test || \
          ./gradlew --no-daemon --stacktrace --rerun-tasks test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: |
            **/build/reports/**
            **/build/test-results/**
