name: CI

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (JDK 21)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle build
        run: ./gradlew --no-daemon --stacktrace detektAll

  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests (retry up to 3 times on flaky failure)
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Test attempt ${attempt}/${max_attempts}"
            if ./gradlew --no-daemon --stacktrace --rerun-tasks test \
                -x :examples:counter:android:test \
                -x :examples:todos:android:test; then
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Tests failed on attempt ${attempt}; retrying..."
              sleep 5
            fi
          done

          echo "Tests failed after ${max_attempts} attempts"
          exit 1

      - name: Smoke-test the assembled rk CLI
        shell: bash
        run: |
          ./gradlew --no-daemon --stacktrace :redux-kotlin-cli:installDist
          bin=redux-kotlin-cli/build/install/rk/bin/rk
          out=$("$bin" --help)
          for grp in devtools snapshot; do
            echo "$out" | grep -q "$grp" || { echo "rk --help is missing group: $grp"; exit 1; }
          done
          dout=$("$bin" devtools --help)
          for cmd in serve actions; do
            echo "$dout" | grep -q "$cmd" || { echo "rk devtools --help missing: $cmd"; exit 1; }
          done

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: |
            **/build/reports/**
            **/build/test-results/**

  samples-android:
    name: Sample apps (Android assembleDebug)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Assemble sample apps
        run: ./gradlew --no-daemon --stacktrace :examples:counter:android:assembleDebug :examples:todos:android:assembleDebug

      - name: Upload sample build reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: samples-android-reports
          path: |
            examples/**/build/reports/**
            examples/**/build/outputs/**
