name: CI

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # detekt upgraded to 1.23.8 to restore JDK 17 compatibility for detektAll.
    name: Validate (JDK 17)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle build
        run: ./gradlew --no-daemon --stacktrace detektAll

  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        java: ['17']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests (retry once on flaky failure)
        run: |
          ./gradlew --no-daemon --stacktrace test || \
          ./gradlew --no-daemon --stacktrace --rerun-tasks test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: |
            **/build/reports/**
            **/build/test-results/**
