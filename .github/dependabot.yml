version: 2
updates:
  # Keep Dependabot active for kotlin-js-store, but stop the recurring
  # qs lane that cannot be upgraded under karma@6.x -> body-parser@^1.19.0.
  - package-ecosystem: "npm"
    directory: "/kotlin-js-store"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "qs"
